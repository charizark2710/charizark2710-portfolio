<!-- Work Experience List -->
<div class="section-list">
  {{ range $index, $work := .workExp }}
  <div
    class="list-item"
    hx-get="/api/work-experience/{{ $index }}"
    hx-target="#content"
    hx-swap="innerHTML"
  >
    <div class="item-header">
      <h3 class="item-title">{{ $work.Company }}</h3>
      <div style="display: flex; align-items: center; gap: 10px">
        {{ if $work.GitHub }}
        <span class="item-github-badge">
          <a
            href="{{ $work.GitHub }}"
            class="github-link"
            target="_blank"
            rel="noopener"
            onclick="event.stopPropagation()"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              width="13"
              height="13"
            >
              <path
                d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"
              />
            </svg>
          </a>
        </span>
        {{ end }}
        <p class="item-subtitle">{{ $work.Position }}</p>
      </div>
    </div>
    <p class="item-duration">{{ $work.Duration }}</p>
    <p class="item-description">{{ $work.Summary }}</p>
  </div>
  {{ end }}
</div>
